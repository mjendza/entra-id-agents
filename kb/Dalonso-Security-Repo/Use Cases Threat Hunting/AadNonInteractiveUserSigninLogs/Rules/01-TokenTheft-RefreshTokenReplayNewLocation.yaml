id: ca2d7a76-26ce-4357-bf5e-09e06a01dac3
name: Token Theft - Refresh Token Replay from New Location
version: 1.1.0
kind: Scheduled
description: |
  Detects when the same user refreshes an OAuth token from a completely different
  IP address AND country within a 30-minute window, focusing on tokens that are
  NOT device-bound (unprotected). This is a strong indicator of refresh token
  theft / pass-the-cookie attacks where an attacker has stolen a refresh token
  and is replaying it from a different network.
  Refinements in v1.1:
  - Filters on TokenProtectionStatus to flag only unbound / non-compliant tokens
    (signInSessionStatusCodes 1002, 1003, 1005, 1006, 1008).
  - Excludes Microsoft first-party application IDs whose backend services
    legitimately refresh tokens from geographically diverse datacenter IPs.
  - Replaces fragile prev() approach with summarize-based distinct-location logic.
  MITRE ATT&CK: T1528 (Steal Application Access Token), T1539 (Steal Web Session Cookie)
severity: High
requiredDataConnectors:
  - connectorId: AzureActiveDirectory
    dataTypes:
      - AADNonInteractiveUserSignInLogs
queryFrequency: 1h
queryPeriod: 1h
triggerOperator: gt
triggerThreshold: 0
tactics:
  - CredentialAccess
  - LateralMovement
relevantTechniques:
  - T1528
  - T1539
query: |
  // Known Microsoft first-party AppIds that legitimately refresh tokens from
  // multiple datacenter locations — exclude to reduce false positives.
  let ExcludedAppIds = dynamic([
      "00000003-0000-0000-c000-000000000000",  // Microsoft Graph
      "00000002-0000-0ff1-ce00-000000000000",  // Office 365 Exchange Online
      "00000003-0000-0ff1-ce00-000000000000",  // Office 365 SharePoint Online
      "00000006-0000-0ff1-ce00-000000000000",  // Microsoft Office
      "d3590ed6-52b3-4102-aeff-aad2292ab01c",  // Microsoft Office (desktop)
      "1fec8e78-bce4-4aaf-ab1b-5451cc387264",  // Microsoft Teams
      "cc15fd57-2c6c-4117-a88c-83b1d56b4bbe",  // Microsoft Teams Web Client
      "5e3ce6c0-2b1f-4285-8d4b-75ee78787346",  // Microsoft Teams (mobile/desktop)
      "27922004-5251-4030-b22d-91ecd9a37ea4",  // Outlook Mobile
      "4765445b-32c6-49b0-83e6-1d93765276ca",  // Microsoft Office Web Apps
      "ab9b8c07-8f02-4f72-87fa-80105867a763",  // Microsoft OneDrive
      "57fb890c-0dab-4253-a5e0-7188c88b2bb4",  // SharePoint Online Client
      "08e18876-6177-487e-b8b5-cf950c1e598c"   // Microsoft SharePoint Online
  ]);
  // TokenProtectionStatus codes indicating the token is NOT device-bound.
  // 1002 = No valid device state
  // 1003 = Device state fails CA policy
  // 1005 = Unbound for unspecified reasons
  // 1006 = OS version unsupported
  // 1008 = Client not integrated with platform broker
  let UnboundTokenCodes = dynamic(["1002", "1003", "1005", "1006", "1008"]);
  AADNonInteractiveUserSignInLogs
  | where TimeGenerated > ago(1h)
  | where ResultType == 0
  // Exclude Microsoft first-party backend services
  | where AppId !in (ExcludedAppIds)
  // Parse TokenProtectionStatus when available; column_ifexists returns '{}'
  // when the column is absent so the query never fails on schema differences.
  | extend TokenProtectionParsed = parse_json(column_ifexists('TokenProtectionStatus', '{}'))
  | extend SessionStatusCode = tostring(TokenProtectionParsed.signInSessionStatus.signInSessionStatusCode)
  // When column is present: keep only unbound/non-compliant tokens (1002/1003/1005/1006/1008).
  // When column is absent (empty): fall through to geographic detection as graceful fallback.
  | where isempty(SessionStatusCode) or SessionStatusCode in (UnboundTokenCodes)
  // Build per-user, per-app windows and detect multi-country activity
  | summarize
      EarliestTime     = min(TimeGenerated),
      LatestTime       = max(TimeGenerated),
      DistinctIPs      = make_set(IPAddress, 10),
      DistinctCountries= make_set(Location, 10),
      EventCount       = count(),
      AppDisplayName   = any(AppDisplayName),
      CorrelationIds   = make_set(CorrelationId, 5),
      SessionStatusCodes = make_set(SessionStatusCode, 5)
    by UserPrincipalName, AppId, bin(TimeGenerated, 30m)
  // Only fire when we see at least 2 distinct countries in the same 30-min bin
  | where array_length(DistinctCountries) >= 2
  // And at least 2 distinct IPs
  | where array_length(DistinctIPs) >= 2
  | project
      EarliestTime,
      LatestTime,
      UserPrincipalName,
      AppDisplayName,
      AppId,
      DistinctIPs,
      DistinctCountries,
      EventCount,
      SessionStatusCodes,
      CorrelationIds,
      TimeBetweenFirstLast = (LatestTime - EarliestTime)
  | order by EarliestTime desc
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: FullName
        columnName: UserPrincipalName
customDetails:
  DistinctIPs: DistinctIPs
  DistinctCountries: DistinctCountries
  AppDisplayName: AppDisplayName
  SessionStatusCodes: SessionStatusCodes
  EventCount: EventCount
alertDetailsOverride:
  alertDisplayNameFormat: "Token Replay Detected - {{UserPrincipalName}} unbound token used from {{DistinctCountries}}"
  alertDescriptionFormat: "User {{UserPrincipalName}} refreshed an unbound token from multiple IPs spanning countries {{DistinctCountries}} within 30 min. App: {{AppDisplayName}}. Possible refresh token theft. Check custom details for full IP list and TokenProtectionStatus codes."
  alertSeverityColumnName: ""
  alertTacticsColumnName: ""
incidentConfiguration:
  createIncident: true
  groupingConfiguration:
    enabled: true
    reopenClosedIncident: false
    lookbackDuration: PT5H
    matchingMethod: AnyAlert
    groupByEntities:
      - Account
    groupByAlertDetails: []
    groupByCustomDetails: []
